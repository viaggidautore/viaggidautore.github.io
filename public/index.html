<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Demo</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #fce4ec);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      height: 90vh;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 15px;
      background: #1976d2;
      color: white;
      font-weight: bold;
      text-align: center;
    }

    .chat {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: #f9f9f9;
    }

    .message {
      display: flex;
      align-items: flex-end;
      margin-bottom: 12px;
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 8px;
      flex-shrink: 0;
      background: #ddd;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
    }

    .bot .bubble {
      background: white;
      border-top-left-radius: 4px;
    }

    .user .bubble {
      background: #1976d2;
      color: white;
      border-top-right-radius: 4px;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ddd;
      padding: 10px;
      background: #fff;
    }

    .input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
      outline: none;
    }

    .input-area button {
      margin-left: 8px;
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      background: #1976d2;
      color: white;
      cursor: pointer;
    }

    .input-area button:hover {
      background: #125ea8;
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">Chat Demo</div>

  <div class="chat" id="chat">
    <div class="message bot">
      <div class="avatar">
        <img src="1772954078498 (1).png" alt="avatar">
      </div>
      <div class="bubble">Ciao! Ora sono dentro il cerchietto 😄</div>
    </div>

    <div class="message user">
      <div class="avatar">
        <img src="https://i.pravatar.cc/100" alt="user">
      </div>
      <div class="bubble">Perfetto, funziona!</div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Scrivi un messaggio..." />
    <button onclick="sendMessage()">Invia</button>
  </div>
</div>

<script>
  function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    const chat = document.getElementById('chat');

    const msg = document.createElement('div');
    msg.className = 'message user';

    msg.innerHTML = `
      <div class="avatar">
        <img src="https://i.pravatar.cc/100" alt="user">
      </div>
      <div class="bubble">${text}</div>
    `;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;

    input.value = '';

    setTimeout(() => {
      const reply = document.createElement('div');
      reply.className = 'message bot';

      reply.innerHTML = `
        <div class="avatar">
          <img src="1772954078498 (1).png" alt="avatar">
        </div>
        <div class="bubble">Risposta automatica 🤖</div>
      `;

      chat.appendChild(reply);
      chat.scrollTop = chat.scrollHeight;
    }, 600);
  }
</script>

</body>
</html>
