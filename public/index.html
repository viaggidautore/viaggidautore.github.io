<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Viaggi d'Autore — Preventivo Viaggio in 30 Secondi</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-ME8ECL7MBY"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-ME8ECL7MBY');

  let lastPreventivoTime = 0;
  const PREVENTIVO_COOLDOWN = 5000;

  function puoInviarePreventivo(){
    const now = Date.now();
    if(now - lastPreventivoTime < PREVENTIVO_COOLDOWN){
      return false;
    }
    lastPreventivoTime = now;
    return true;
  }
</script>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f1f35">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* Manteniamo tutto il tuo CSS originale */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --navy: #0f1f35; --navy-mid: #1a3050; --gold: #c8952a; --gold-light: #e8b84b;
  --cream: #fdf8f0; --white: #ffffff;
}
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: #1a1a2e; }

/* NUOVI STILI PER LOADER E CONTATORE */
.loader-ricerca {
  align-self: flex-start;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: rgba(200, 149, 42, 0.1);
  border: 1px dashed var(--gold);
  border-radius: 12px;
  font-size: 0.85rem;
  color: var(--navy);
  margin: 10px 0;
  animation: fadeIn 0.3s ease;
}
.spinner-small {
  width: 16px; height: 16px;
  border: 2px solid rgba(200,149,42,0.2);
  border-top: 2px solid var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { 100% { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.social-proof {
  display: block; color: var(--gold-light);
  font-weight: 600; margin-top: 5px; font-size: 0.78rem;
}

/* Stili Chat Originali */
nav { background: var(--navy); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
.nav-brand { font-family: 'Playfair Display', serif; color: white; font-size: 1.25rem; }
.nav-brand span { color: var(--gold-light); }
.hero { background: var(--navy); padding: 50px 24px; text-align: center; color: white; }
.chat-box { max-width: 600px; margin: -30px auto 30px; background: white; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); overflow: hidden; }
#chatMsgs { padding: 20px; height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #f8f9fb; }
.msg-bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 0.92rem; }
.msg-bot { align-self: flex-start; background: #eee; border-bottom-left-radius: 4px; }
.msg-user { align-self: flex-end; background: var(--navy); color: white; border-bottom-right-radius: 4px; }
.chat-input-area { display: flex; gap: 10px; padding: 15px; border-top: 1px solid #eee; }
.chat-input { flex: 1; padding: 12px 20px; border-radius: 30px; border: 1px solid #ddd; outline: none; }
.chat-send { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; color: white; }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">Viaggi d'<span>Autore</span></div>
</nav>

<section class="hero">
  <h1>Il tuo viaggio su misura.</h1>
  <p>Ricevi un preventivo completo in 30 secondi.</p>
</section>

<div class="chat-box">
  <div id="chatMsgs">
    <div class="msg-bubble msg-bot">Ciao! Sono Ivan. Dove ti piacerebbe andare? ✨</div>
  </div>
  
  <div id="quickReplyArea" style="display:none; text-align:center; padding: 10px;">
    <button onclick="sendQuickReply('SI VOGLIO SERVIZIO')" style="background:var(--gold); border:none; padding:10px 20px; border-radius:20px; color:white; font-weight:bold; cursor:pointer;">✅ SI, VOGLIO IL SERVIZIO</button>
  </div>

  <div class="chat-input-area">
    <input type="text" id="chatInput" class="chat-input" placeholder="Es: Giappone a Maggio...">
    <button id="chatSend" class="chat-send" onclick="sendMsg()">></button>
  </div>
  
  <div style="text-align:center; padding-bottom: 15px;">
    <span style="font-size: 0.7rem; color: #999;">Risposta media: 30s</span>
    <span class="social-proof">🔥 <span id="today-counter">54</span> preventivi fatti oggi</span>
  </div>
</div>

<script>
  const WEBHOOK = 'https://n8n.ivandat.it/webhook/viaggi-dautore-chat';

  // CONTATORE DINAMICO
  function initCounter() {
    const el = document.getElementById('today-counter');
    let count = 54 + Math.floor(Math.random() * 10);
    el.innerText = count;
    setInterval(() => { if(Math.random() > 0.8) { count++; el.innerText = count; } }, 12000);
  }
  initCounter();

  function formatRisposta(t) {
    t = t.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
    t = t.replace(/\n/g, '<br>');
    return t;
  }

  function addMsg(text, isUser) {
    const container = document.getElementById('chatMsgs');
    const div = document.createElement('div');
    div.className = 'msg-bubble ' + (isUser ? 'msg-user' : 'msg-bot');
    div.innerHTML = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  async function sendMsg() {
    const input = document.getElementById('chatInput');
    const testo = input.value.trim();
    if (!testo || !puoInviarePreventivo()) return;

    addMsg(testo, true);
    input.value = '';
    input.disabled = true;

    // --- AGGIUNTA LOADER ---
    const loader = document.createElement('div');
    loader.className = 'loader-ricerca';
    loader.id = 'temp-loader';
    loader.innerHTML = `<div class="spinner-small"></div> <span>🔎 Sto cercando voli e hotel...</span>`;
    document.getElementById('chatMsgs').appendChild(loader);
    document.getElementById('chatMsgs').scrollTop = document.getElementById('chatMsgs').scrollHeight;

    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
        body: JSON.stringify({ messaggio: testo })
      });
      const data = await res.json();
      
      if(document.getElementById('temp-loader')) document.getElementById('temp-loader').remove();

      if (data.risposta) {
        addMsg(formatRisposta(data.risposta), false);
        if (data.risposta.includes('SI VOGLIO SERVIZIO')) document.getElementById('quickReplyArea').style.display = 'block';
        document.getElementById('today-counter').innerText = parseInt(document.getElementById('today-counter').innerText) + 1;
      }
    } catch(e) {
      if(document.getElementById('temp-loader')) document.getElementById('temp-loader').remove();
      addMsg("Errore di connessione. Riprova.", false);
    }
    input.disabled = false;
    input.focus();
  }

  document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
